{% extends 'base.html' %}

{% block title %}Бронирование — {{ guide.name }}{% endblock %}

{% block content %}
<section class="py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-7 col-lg-6">
        <div class="card card-glass p-4">
          <div class="text-center mb-4">
            <div class="auth-icon mx-auto mb-3">
              <i class="bi bi-calendar-check"></i>
            </div>
            <h2 class="fw-bold">Забронировать</h2>
            <p class="text-muted small">{{ guide.name }} · {{ guide.city }}</p>
          </div>

          <form method="post" novalidate>
            {% csrf_token %}

            {% if guide.services_text %}
            <div class="mb-3">
              <label class="form-label fw-medium"><i class="bi bi-briefcase me-2 text-accent"></i>Предлагаемые услуги</label>
              <div class="p-3 bg-light border rounded small text-muted">
                {{ guide.services_text|linebreaksbr }}
              </div>
            </div>
            {% endif %}

            <div class="mb-3">
              <label for="service_name" class="form-label fw-medium">Выберите услугу *</label>
              <input type="text" name="service_name" id="service_name"
                     class="form-control" placeholder="Впишите название услуги из списка выше" required>
            </div>

            <div class="mb-3">
              <label for="date" class="form-label fw-medium">Дата *</label>
              <input type="date" name="date" id="date"
                     class="form-control" required>
            </div>

            <div class="mb-3">
              <label for="comment" class="form-label fw-medium">Комментарий</label>
              <textarea name="comment" id="comment" rows="3"
                        class="form-control" placeholder="Пожелания, вопросы…"></textarea>
            </div>

            <button type="submit" class="btn btn-accent w-100 rounded-pill py-2 mt-2">
              <i class="bi bi-check-circle me-1"></i>Отправить заявку
            </button>
          </form>

          <p class="text-center text-muted small mt-3 mb-0">
            <a href="{% url 'guides:detail' guide.pk %}" class="text-accent fw-semibold">
              <i class="bi bi-arrow-left me-1"></i>Вернуться к профилю
            </a>
          </p>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
